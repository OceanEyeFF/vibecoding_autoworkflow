name: aw-plan-gate

on:
  push:
    branches: [ "*" ]
  pull_request:
  workflow_dispatch:

jobs:
  plan-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Plan review
        run: python .autoworkflow/tools/autoworkflow.py plan review --root .
      - name: Gate (dry-run)
        run: python .autoworkflow/tools/autoworkflow.py gate --root . --allow-unreviewed
      - name: Agents workflow (trace)
        run: python agents_runner.py --root . --allow-unreviewed
      - name: Upload trace
        uses: actions/upload-artifact@v4
        with:
          name: aw-trace
          path: .autoworkflow/trace/*.jsonl
