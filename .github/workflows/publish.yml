name: Publish aw-installer

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: aw-installer-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 30
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      GITHUB_RELEASE_TAG: ${{ github.event.release.tag_name }}
      GITHUB_RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
      GITHUB_RELEASE_BODY: ${{ github.event.release.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json', 'toolchain/scripts/deploy/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Set up npm for Trusted Publishing
        run: |
          expected_npm_integrity="sha512-Iy5vXZ55m8tIaSCz6bqQf9+W5XbPfoyURsgWLjOkFglqHTep6RDZqRj2sfYGeRyZvGu2HuJWm0lux0rxPQ29lQ=="
          actual_npm_integrity="$(npm view npm@11.5.1 dist.integrity)"
          test "$actual_npm_integrity" = "$expected_npm_integrity"
          npm install -g npm@11.5.1
          node --version
          npm --version

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip==25.3
          python -m pip install --requirement .github/requirements-ci.txt

      - name: Resolve release metadata
        run: node toolchain/scripts/deploy/bin/resolve-release-metadata.js

      - name: Folder logic check
        run: python toolchain/scripts/test/folder_logic_check.py

      - name: Path governance check
        run: python toolchain/scripts/test/path_governance_check.py

      - name: Governance semantic check
        run: python toolchain/scripts/test/governance_semantic_check.py

      - name: Governance tests
        run: python -m pytest toolchain/scripts/test

      - name: Deploy regression tests
        run: python -m unittest discover -s toolchain/scripts/deploy -p 'test_*.py'

      - name: Deploy package smoke
        run: npm --prefix toolchain/scripts/deploy run smoke --silent

      - name: Deploy package unit tests
        run: npm --prefix toolchain/scripts/deploy test --silent

      - name: Root aw-installer package pack dry-run
        run: npm pack --dry-run --json

      - name: Root aw-installer publish dry-run
        run: npm run publish:dry-run --silent

      - name: Real publish guard
        env:
          AW_INSTALLER_PUBLISH_APPROVED: "1"
          CI: "true"
        run: npm_config_tag="$NPM_CONFIG_TAG" node toolchain/scripts/deploy/bin/check-root-publish.js

      - name: Publish to npm
        env:
          AW_INSTALLER_PUBLISH_APPROVED: "1"
          CI: "true"
        run: npm publish --provenance --access public --tag "$AW_INSTALLER_RELEASE_CHANNEL"
