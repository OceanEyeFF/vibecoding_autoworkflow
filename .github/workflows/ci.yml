name: Governance Checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Folder logic check
        run: python toolchain/scripts/test/folder_logic_check.py

      - name: Path governance check
        run: python toolchain/scripts/test/path_governance_check.py

      - name: Governance semantic check
        run: python toolchain/scripts/test/governance_semantic_check.py

      - name: Governance tests
        run: python -m pytest toolchain/scripts/test/test_folder_logic_check.py toolchain/scripts/test/test_closeout_gate_tools.py
