name: aw-installer bug or blocker
description: Report an install, diagnose, verify, update, or initialization blocker.
title: "[aw-installer bug]: "
labels:
  - aw-installer
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Report only sanitized details. Do not include secrets, private repository names, private organization names, customer names, user handles, private URLs, or full logs with credentials.
  - type: dropdown
    id: failure_area
    attributes:
      label: Failure area
      options:
        - package acquisition
        - help/version
        - tui guard
        - diagnose
        - update dry-run
        - install
        - verify
        - update --yes
        - Codex .aw initialization
        - Claude Code .aw initialization
        - documentation / operator confusion
        - other
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Backend or runtime path
      options:
        - agents
        - Claude Code project-level helper
        - other / unsupported
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Ubuntu 24.04, bash, Node 22, npm 10, Codex"
    validations:
      required: true
  - type: input
    id: candidate_version
    attributes:
      label: Candidate version/source
      placeholder: "registry npx aw-installer, aw-installer@next, local .tgz, source checkout, or unknown"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or prompt that failed
      description: Redact private paths if needed.
      render: shell
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed result
      description: Include the first failure line or sanitized summary. Avoid full logs with secrets.
    validations:
      required: true
  - type: textarea
    id: npx_run_log
    attributes:
      label: npx run log
      description: Attach or paste the relevant sanitized excerpt from aw-installer-npx-run.log if the registry npx smoke runner produced one.
      render: shell
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: target_repo_shape
    attributes:
      label: Sanitized target repository shape
      placeholder: "Python service with pyproject.toml; existing .agents directory absent."
    validations:
      required: false
  - type: dropdown
    id: blocking_level
    attributes:
      label: Blocking level
      options:
        - blocks all trial use
        - blocks one command
        - confusing but recoverable
        - documentation-only
        - unknown
    validations:
      required: true
  - type: textarea
    id: recovery
    attributes:
      label: Recovery attempted
      placeholder: "Ran diagnose again; retried with default repo-local .agents/skills; checked quickstart."
    validations:
      required: false
  - type: checkboxes
    id: safety_check
    attributes:
      label: Safety and boundary check
      options:
        - label: I did not include secrets, credentials, tokens, or private URLs.
          required: true
        - label: I did not include private repository names, private organization names, customer names, user handles, or private URLs unless explicitly approved.
          required: true
        - label: I understand this report does not request or authorize a stable release or future npm publish.
          required: true
